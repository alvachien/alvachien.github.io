# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write



# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
  
jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: |
          mkdir -p .jekyll-cache _site
        
          # 根据分支设置不同的 baseurl
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # 生产环境：使用配置文件中定义的 baseurl
            BASEURL_CMD=""
          else
            # 预览环境：使用 /preview 作为 baseurl
            BASEURL_CMD="--baseurl /preview"
          fi
        
          docker run --rm \
            -v ${{ github.workspace }}:/srv/jekyll \
            -v ${{ github.workspace }}/.jekyll-cache:/srv/jekyll/.jekyll-cache \
            -v ${{ github.workspace }}/_site:/srv/jekyll/_site \
            -e JEKYLL_ENV=production \
            jekyll/builder:latest \
            /bin/bash -c "bundle install && bundle exec jekyll build $BASEURL_CMD --trace"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
